<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频 Cast 发送者</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* 头部 */
    .header {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    h1 {
      font-size: 24px;
      color: #333;
    }
    
    .cast-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #667eea;
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    
    .cast-btn:hover {
      background: #5568d3;
      transform: scale(1.05);
    }
    
    .cast-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    /* 设备列表 */
    .device-section {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
    }
    
    .device-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .device-title {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }
    
    .refresh-btn {
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      font-size: 13px;
    }
    
    .device-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .device-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background: white;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    
    .device-item:hover {
      border-color: #667eea;
    }
    
    .device-item.connected {
      border-color: #4caf50;
      background: #f1f8f4;
    }
    
    .device-icon {
      width: 40px;
      height: 40px;
      background: #e8e8e8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 20px;
    }
    
    .device-info {
      flex: 1;
    }
    
    .device-name {
      font-weight: 500;
      color: #333;
    }
    
    .device-status {
      font-size: 12px;
      color: #999;
    }
    
    .device-item.connected .device-status {
      color: #4caf50;
    }
    
    /* 音频列表 */
    .audio-section {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .section-title {
      font-size: 18px;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .audio-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .audio-item {
      display: flex;
      align-items: center;
      padding: 14px;
      background: #f8f9fa;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    
    .audio-item:hover {
      background: #e8e8e8;
      border-color: #667eea;
    }
    
    .audio-item.playing {
      background: #667eea;
      color: white;
    }
    
    .audio-icon {
      width: 48px;
      height: 48px;
      background: #667eea;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 14px;
      font-size: 24px;
    }
    
    .audio-item.playing .audio-icon {
      background: white;
    }
    
    .audio-info {
      flex: 1;
    }
    
    .audio-title {
      font-weight: 500;
      margin-bottom: 4px;
    }
    
    .audio-artist {
      font-size: 13px;
      opacity: 0.7;
    }
    
    .audio-duration {
      font-size: 13px;
      opacity: 0.5;
    }
    
    /* 自定义 URL */
    .custom-section {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .input-group {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    
    input[type="text"] {
      flex: 1;
      padding: 14px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }
    
    input[type="text"]:focus {
      border-color: #667eea;
    }
    
    .play-btn {
      padding: 14px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .play-btn:hover {
      background: #5568d3;
    }
    
    .play-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    /* 播放控制 */
    .controls-section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .progress-section {
      margin-bottom: 16px;
    }
    
    .progress-bar {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #e0e0e0;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    
    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #667eea;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .progress-bar::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #667eea;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    
    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }
    
    .control-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
    }
    
    .control-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #f0f0f0;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.3s;
    }
    
    .control-btn:hover {
      background: #e0e0e0;
      transform: scale(1.05);
    }
    
    .control-btn.primary {
      background: #667eea;
      color: white;
    }
    
    .control-btn.primary:hover {
      background: #5568d3;
    }
    
    /* 音量控制 */
    .volume-section {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
    }
    
    .volume-icon {
      font-size: 20px;
      color: #666;
    }
    
    .volume-slider {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: #e0e0e0;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #667eea;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .volume-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #667eea;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    
    .volume-value {
      font-size: 13px;
      color: #666;
      min-width: 36px;
      text-align: right;
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    /* 加载动画 */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <div class="header-top">
        <h1>🎵 音频 Cast</h1>
        <button id="castBtn" class="cast-btn" title="连接设备">📺</button>
      </div>
      
      <!-- 设备列表 -->
      <div class="device-section">
        <div class="device-header">
          <span class="device-title">可用设备</span>
          <button class="refresh-btn" onclick="refreshDevices()">🔄 刷新</button>
        </div>
        <div id="deviceList" class="device-list">
          <div class="empty-state">
            <div class="empty-icon">📡</div>
            <div>点击上方按钮搜索设备</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 音频列表 -->
    <div class="audio-section">
      <div class="section-title">
        <span>🎶</span>
        <span>音频列表</span>
      </div>
      <div id="audioList" class="audio-list">
        <!-- 动态生成 -->
      </div>
    </div>
    
    <!-- 自定义 URL -->
    <div class="custom-section" style="display: none;">
      <div class="section-title">
        <span>🔗</span>
        <span>自定义音频</span>
      </div>
      <div class="input-group">
        <input type="text" id="customUrl" placeholder="输入音频 URL (m4a/mp3/aac)">
        <button id="playCustom" class="play-btn" disabled>播放</button>
      </div>
    </div>
    
    <!-- 播放控制 -->
    <div class="controls-section">
      <!-- 进度条 -->
      <div class="progress-section">
        <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0" disabled>
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
      
      <!-- 控制按钮 -->
      <div class="control-buttons">
        <button class="control-btn" id="btnPrev">⏮️</button>
        <button class="control-btn primary" id="btnPlay">▶️</button>
        <button class="control-btn" id="btnNext">⏭️</button>
      </div>
      
      <!-- 音量控制 -->
      <div class="volume-section">
        <span class="volume-icon">🔊</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="50">
        <span class="volume-value" id="volumeValue">50%</span>
      </div>
    </div>
  </div>

  <!-- 加载 Cast Sender SDK -->
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  
  <script>
    // 配置
    // const APP_ID = 'CC1AD845';  // 默认媒体接收器
    const APP_ID = '389E3C60';  // 默认媒体接收器
    
    // 示例音频列表
    const audioList = [
      { id: 1, title: '情缘巴士站', artist: '谭咏麟', url: 'https://s.5bb3.com/m4a/7f10900a3aca71a683027a76998f58c5.m4a', duration: '3:45' },
      { id: 2, title: '破晓时分', artist: '李克勤', url: 'https://s.5bb3.com/m4a/2cc3f365e37371923f6b1718d7e1efe4.m4a', duration: '4:12' },
      { id: 3, title: '当我唱起这首歌', artist: '小贱', url: 'http://ting9.yymp3.com/new20/xiaojian/3.mp3', duration: '3:28' },
    ];
    
    let castSession = null;
    let currentAudioIndex = -1;
    let isPlaying = false;
    
    // 初始化 Cast
    window['__onGCastApiAvailable'] = function(isAvailable) {
      if (isAvailable) {
        initializeCastApi();
      }
    };
    
    function initializeCastApi() {
      const context = cast.framework.CastContext.getInstance();
      context.setOptions({
        receiverApplicationId: APP_ID,
        autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
      });
      
      // 监听连接状态
      context.addEventListener(
        cast.framework.CastContextEventType.SESSION_STATE_CHANGED,
        event => {
          switch (event.sessionState) {
            case cast.framework.SessionState.SESSION_STARTED:
            case cast.framework.SessionState.SESSION_RESUMED:
              castSession = event.session;
              updateDeviceList();
              updateUI(true);
              break;
            case cast.framework.SessionState.SESSION_ENDED:
              castSession = null;
              updateUI(false);
              break;
          }
        }
      );
      
      // 渲染音频列表
      renderAudioList();
    }
    
    // 渲染音频列表
    function renderAudioList() {
      const listEl = document.getElementById('audioList');
      listEl.innerHTML = audioList.map((audio, index) => `
        <div class="audio-item ${index === currentAudioIndex ? 'playing' : ''}" data-index="${index}">
          <div class="audio-icon">🎵</div>
          <div class="audio-info">
            <div class="audio-title">${audio.title}</div>
            <div class="audio-artist">${audio.artist}</div>
          </div>
          <div class="audio-duration">${audio.duration}</div>
        </div>
      `).join('');
      
      // 绑定点击事件
      document.querySelectorAll('.audio-item').forEach(item => {
        item.addEventListener('click', () => {
          const index = parseInt(item.dataset.index);
          playAudio(index);
        });
      });
    }
    
    // 搜索设备
    document.getElementById('castBtn').addEventListener('click', () => {
      if (!castSession) {
        requestCastSession();
      } else {
        // 断开连接
        const context = cast.framework.CastContext.getInstance();
        context.endCurrentSession(true);
      }
    });
    
    function requestCastSession() {
      if (typeof cast === 'undefined' || !cast.framework) {
        alert('请使用 Chrome 浏览器');
        return;
      }
      
      initializeCastApi();
      const context = cast.framework.CastContext.getInstance();
      context.requestSession().then(
        session => console.log('连接成功'),
        error => {
          if (error !== 'cancel') {
            alert('连接失败: ' + error);
          }
        }
      );
    }
    
    // 刷新设备列表
    function refreshDevices() {
      if (!castSession) {
        alert('请先连接设备');
        return;
      }
      updateDeviceList();
    }
    
    // 更新设备列表显示
    function updateDeviceList() {
      const listEl = document.getElementById('deviceList');
      if (castSession) {
        const device = castSession.getCastDevice();
        listEl.innerHTML = `
          <div class="device-item connected">
            <div class="device-icon">🔊</div>
            <div class="device-info">
              <div class="device-name">${device.friendlyName}</div>
              <div class="device-status">已连接</div>
            </div>
          </div>
        `;
      } else {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📡</div>
            <div>未连接设备</div>
          </div>
        `;
      }
    }
    
    // 更新 UI 状态
    function updateUI(connected) {
      const castBtn = document.getElementById('castBtn');
      const playBtn = document.getElementById('playCustom');
      
      if (connected) {
        castBtn.textContent = '✓';
        castBtn.style.background = '#4caf50';
        playBtn.disabled = false;
      } else {
        castBtn.textContent = '📺';
        castBtn.style.background = '#667eea';
        playBtn.disabled = true;
        updateDeviceList();
      }
    }
    
    // 播放音频
    async function playAudio(index) {
      if (!castSession) {
        alert('请先连接设备');
        return;
      }
      
      if (index < 0 || index >= audioList.length) return;
      
      currentAudioIndex = index;
      const audio = audioList[index];
      
      // 更新 UI
      renderAudioList();
      document.getElementById('btnPlay').textContent = '⏸️';
      isPlaying = true;
      
      // 播放
      await playMedia(audio.url, audio.title, audio.artist);
    }
    
    // 播放媒体
    async function playMedia(url, title, artist) {
      const contentType = url.endsWith('.m3u8') ? 'application/x-mpegurl' : 'audio/mp4';
      
      const mediaInfo = new chrome.cast.media.MediaInfo(url, contentType);
      mediaInfo.metadata = new chrome.cast.media.MusicTrackMediaMetadata();
      mediaInfo.metadata.title = title;
      mediaInfo.metadata.artist = artist;
      
      // 设置流类型为 BUFFERED，帮助获取准确的时长
      mediaInfo.streamType = chrome.cast.media.StreamType.BUFFERED;
      
      const request = new chrome.cast.media.LoadRequest(mediaInfo);
      request.autoplay = true;
      
      try {
        await castSession.loadMedia(request);
        console.log('播放成功:', title);
        
        // 监听媒体状态变化，获取时长
        const media = castSession.getMediaSession();
        if (media) {
          media.addUpdateListener(() => {
            if (media.media && media.media.duration > 0) {
              document.getElementById('totalTime').textContent = formatTime(media.media.duration);
              progressBar.disabled = false;
            }
          });
        }
      } catch (error) {
        console.error('播放失败:', error);
        alert('播放失败: ' + error.message);
      }
    }
    
    // 自定义 URL 播放
    document.getElementById('playCustom').addEventListener('click', () => {
      const url = document.getElementById('customUrl').value.trim();
      if (url) {
        playMedia(url, '自定义音频', '未知');
      }
    });
    
    // 播放控制
    document.getElementById('btnPlay').addEventListener('click', () => {
      if (!castSession) {
        alert('请先连接设备');
        return;
      }
      
      // 获取当前媒体会话
      const media = castSession.getMediaSession();
      if (!media) {
        // 没有媒体在播放，播放当前选中的音频
        if (currentAudioIndex >= 0) {
          playAudio(currentAudioIndex);
        } else {
          alert('请先选择音频');
        }
        return;
      }
      
      // 有媒体在播放，控制暂停/播放
      if (isPlaying) {
        media.pause(null, null, null);
        document.getElementById('btnPlay').textContent = '▶️';
        isPlaying = false;
      } else {
        media.play(null, null, null);
        document.getElementById('btnPlay').textContent = '⏸️';
        isPlaying = true;
      }
    });
    
    document.getElementById('btnPrev').addEventListener('click', () => {
      if (currentAudioIndex > 0) {
        playAudio(currentAudioIndex - 1);
      }
    });
    
    document.getElementById('btnNext').addEventListener('click', () => {
      if (currentAudioIndex < audioList.length - 1) {
        playAudio(currentAudioIndex + 1);
      }
    });
    
    // 音量控制
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValue = document.getElementById('volumeValue');
    
    volumeSlider.addEventListener('input', () => {
      const volume = volumeSlider.value;
      volumeValue.textContent = volume + '%';
      
      // 更新音量图标
      const icon = document.querySelector('.volume-icon');
      if (volume == 0) icon.textContent = '🔇';
      else if (volume < 30) icon.textContent = '🔈';
      else if (volume < 70) icon.textContent = '🔉';
      else icon.textContent = '🔊';
    });
    
    volumeSlider.addEventListener('change', () => {
      const volume = volumeSlider.value;
      volumeValue.textContent = volume + '%';
      
      // 更新音量图标
      const icon = document.querySelector('.volume-icon');
      if (volume == 0) icon.textContent = '🔇';
      else if (volume < 30) icon.textContent = '🔈';
      else if (volume < 70) icon.textContent = '🔉';
      else icon.textContent = '🔊';
      
      // 通过 Media Session 设置音量
      if (castSession) {
        const media = castSession.getMediaSession();
        if (media) {
          const volumeRequest = new chrome.cast.media.VolumeRequest(
            new chrome.cast.Volume(volume / 100, false)
          );
          media.setVolume(volumeRequest, () => {
            console.log('音量设置成功:', volume + '%');
          }, (error) => {
            console.error('设置音量失败:', error);
          });
        }
      }
    });
    
    // 进度条控制
    const progressBar = document.getElementById('progressBar');
    let isDraggingProgress = false;
    
    progressBar.addEventListener('mousedown', () => {
      isDraggingProgress = true;
    });
    
    progressBar.addEventListener('input', () => {
      if (!castSession) return;
      
      const media = castSession.getMediaSession();
      if (media && media.media && media.media.duration) {
        const seekTime = (progressBar.value / 100) * media.media.duration;
        document.getElementById('currentTime').textContent = formatTime(seekTime);
      }
    });
    
    progressBar.addEventListener('change', () => {
      isDraggingProgress = false;
      if (!castSession) return;
      
      const media = castSession.getMediaSession();
      if (media && media.media && media.media.duration) {
        const seekTime = (progressBar.value / 100) * media.media.duration;
        media.seek({ currentTime: seekTime }, null, null);
      }
    });
    
    // 格式化时间
    function formatTime(seconds) {
      if (!seconds || isNaN(seconds)) return '0:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return mins + ':' + (secs < 10 ? '0' : '') + secs;
    }
    
    // 更新播放进度
    function updateProgress() {
      if (!castSession || isDraggingProgress) return;
      
      const media = castSession.getMediaSession();
      if (media && media.media) {
        const current = media.getEstimatedTime();
        const duration = media.media.duration;
        
        // 只有在获取到有效时长后才更新
        if (duration && duration > 0 && !isNaN(duration)) {
          progressBar.value = (current / duration) * 100;
          document.getElementById('currentTime').textContent = formatTime(current);
          document.getElementById('totalTime').textContent = formatTime(duration);
          progressBar.disabled = false;
        } else {
          // 时长未知时显示加载中
          document.getElementById('totalTime').textContent = '--:--';
          progressBar.disabled = true;
        }
      }
    }
    
    // 每秒更新进度
    setInterval(updateProgress, 1000);
    
    // 监听播放状态变化
    function onMediaStatusUpdate() {
      if (!castSession) return;
      
      const media = castSession.getMediaSession();
      if (media) {
        // 更新音量
        if (media.volume && media.volume.level !== undefined) {
          const volumePercent = Math.round(media.volume.level * 100);
          volumeSlider.value = volumePercent;
          volumeValue.textContent = volumePercent + '%';
        }
        
        // 更新播放状态
        if (media.playerState === chrome.cast.media.PlayerState.PLAYING) {
          document.getElementById('btnPlay').textContent = '⏸️';
          isPlaying = true;
        } else {
          document.getElementById('btnPlay').textContent = '▶️';
          isPlaying = false;
        }
      }
    }
  </script>
</body>
</html>
